<div class="settings">

  <div class="settings-header">
    <h1>Settings</h1>
  </div>

  <div class="settings-body">

    <!-- ── Auto-Play ──────────────────────────── -->
    <section class="section">
      <h2 class="section-title">⚡ Auto-Play</h2>

      <div class="toggle-row" (click)="toggleAutoPlay('autoPlayQuestion')">
        <div class="toggle-info">
          <span class="toggle-label">Auto-play question</span>
          <span class="toggle-desc">Play question audio automatically when it appears</span>
        </div>
        <div class="toggle-switch" [class.on]="settings().autoPlayQuestion">
          <div class="toggle-thumb"></div>
        </div>
      </div>

      <div class="toggle-row" (click)="toggleAutoPlay('autoPlayAnswer')">
        <div class="toggle-info">
          <span class="toggle-label">Auto-play first answer</span>
          <span class="toggle-desc">Play first answer automatically when revealed</span>
        </div>
        <div class="toggle-switch" [class.on]="settings().autoPlayAnswer">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </section>

    <!-- ── Data ──────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">💾 Data</h2>

      <button class="data-btn" (click)="exportData()">
        📤 Export Progress (JSON)
      </button>

      <label class="data-btn import-label">
        📥 Import Progress (JSON)
        <input type="file" accept=".json" style="display:none" (change)="importData($event)" />
      </label>

      <button class="data-btn danger" (click)="resetProgress()">
        @if (resetConfirm()) {
          ⚠️ Tap again to confirm reset
        } @else {
          🔄 Reset All Progress
        }
      </button>
      <p class="danger-hint">Resets dominance, practice count and last-tried for all questions.</p>
    </section>

  </div>
</div>
